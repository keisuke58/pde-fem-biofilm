name: CI

# Runs the verification assets on every push/PR: the unit suite, the
# Fortran UMAT <-> USERMAT cross-check + adversarial hunt, and a
# non-blocking repo audit.

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests
        run: pytest tests/

      - name: UMAT <-> USERMAT cross-check + adversarial hunt (Fortran)
        run: pytest ansys_usermat/crosscheck/crosscheck.py ansys_usermat/crosscheck/adversarial.py

      - name: Repo audit (non-blocking)
        continue-on-error: true
        run: python JAXFEM/audit_all.py --quick
